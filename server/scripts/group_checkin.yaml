schema_version: 1
id: group_checkin
title: Group Feelings Circle
description: >
  A clinician-led group check-in. The linear arc is short and fully therapist-paced:
  a tap check-in, a go-around where each child says more about how they feel and why,
  and a closing tap check-out. Everything else is an on-demand activity the therapist
  launches by button. Conversation phases never auto-advance — the clinician clicks
  Next activity (a cue appears when everyone has shared).
age_range: [7, 11]
recommended_group_size: [1, 6]

intro_prompt:
  text: >
    Hi everyone, welcome to our circle. We're going to start by checking in about how
    we're each feeling today. There are no wrong answers here.

closing_prompt:
  text: >
    Thank you all for sharing today. Let's take one slow breath together, and get ready
    for what's next. Great job, everyone.

phases:
  - id: feelings_checkin
    title: How are you feeling?
    mode: rating
    rating_scale: 5
    opening_prompt:
      text: >
        Before we start, tap the face that shows how you're feeling right now.
        There are no wrong answers.
    transition_prompt:
      text: Thanks for checking in, everyone.
    turn_policy:
      order: open
    participation:
      require_all_speak: false
      quiet_participant_strategy: skip
    pacing:
      min_phase_seconds: 0
      max_phase_seconds: 60
      advance_when: timer
    facilitator_notes: >
      A quick feelings check-in. Each child taps a face from 1 (low) to 5 (great).
      Advances the moment everyone has tapped, or after the 60s backstop.

  - id: share_feelings
    title: Tell us more
    opening_prompt:
      text: >
        Now let's go around the circle. When it's your turn, tell us a bit more —
        how are you feeling today, and why? You can always say "pass."
      addressed_to: current_turn
    transition_prompt:
      text: Thank you, everyone, for sharing how you feel.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 25
      per_turn_hard_seconds: 45
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 15
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
      honor_pass: true
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      A round-robin feelings go-around with a small group of children. Validate each
      child's feeling warmly and briefly; gently invite quieter children when prompted.
      This phase never advances on its own — the therapist presses Next activity
      (a cue appears once every child has shared).

  - id: feelings_checkout
    title: One last check-in
    mode: rating
    rating_scale: 5
    opening_prompt:
      text: >
        One last tap before we go — how are you feeling now? Pick the face that fits.
    transition_prompt:
      text: Thank you for sharing how you feel.
    turn_policy:
      order: open
    participation:
      require_all_speak: false
      quiet_participant_strategy: skip
    pacing:
      min_phase_seconds: 0
      max_phase_seconds: 60
      advance_when: timer
    facilitator_notes: >
      A closing feelings check-in that mirrors the opening one, so the therapist can
      see how each child's mood shifted across the session.

  # --- On-demand activity library (menu_only) ----------------------------------
  # Launched by button at any time; the linear script resumes with Next activity.
  # Turn-based activities are therapist-paced (advance_when: manual).

  - id: act_feeling_stories
    title: Feeling stories
    menu_only: true
    opening_prompt:
      text: >
        Let's tell some feeling stories. I'll name a feeling — when it's your turn,
        tell us a short story about a time YOU felt that way.
    transition_prompt:
      text: Those were wonderful stories. Thank you, everyone.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 30
      per_turn_hard_seconds: 60
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 18
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      The therapist names a feeling out loud (or shares one with the prompt box); each
      child takes a turn telling a short story about a time they felt that way —
      emotion-identification storytelling from group CBT. The therapist paces it and
      presses Next activity when the round feels complete.

  - id: act_feelings
    title: Feeling naming
    menu_only: true
    opening_prompt:
      text: >
        Let's name some feelings. When it's your turn, say one feeling word — like happy,
        nervous, excited, or proud. You can always say "pass."
    transition_prompt:
      text: Thank you for naming those feelings, everyone.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 25
      per_turn_hard_seconds: 45
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 15
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      Emotion-identification go-around (the "Feelings" step in Coping Cat / FRIENDS-style
      CBT). Validate each child's feeling warmly and briefly; gently invite quieter kids.

  - id: act_compliments
    title: Compliment circle
    menu_only: true
    opening_prompt:
      text: >
        Let's pass a little kindness around the circle. On your turn, say one kind thing —
        about someone here, or about the whole group.
    transition_prompt:
      text: What a kind circle. Thank you, everyone.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 25
      per_turn_hard_seconds: 45
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 15
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      Compliment-giving round — builds positive peer interaction and reinforcement, a
      core social-skills-group activity. Keep it sincere and specific.

  - id: act_brave
    title: Brave moment
    menu_only: true
    opening_prompt:
      text: >
        Let's share brave moments. On your turn, tell us one brave thing you did — or one
        you'd like to try. Brave can be small!
    transition_prompt:
      text: Those were some brave shares. Thank you.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 30
      per_turn_hard_seconds: 50
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 18
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      "Brave step" sharing — the exposure / FEAR-plan idea from Coping Cat: name a small
      brave action. Celebrate every attempt; never push a child who passes.

  - id: act_checkout
    title: Check-out circle
    menu_only: true
    quick_replies: true
    opening_prompt:
      text: >
        Before we go, let's each share one feeling word. When it's your turn, say it out
        loud — or just tap the feeling below.
    transition_prompt:
      text: Thank you for sharing your feelings, everyone.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 20
      per_turn_hard_seconds: 40
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 15
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      A closing feelings round where tapping counts as sharing: each child names one
      feeling out loud or taps a feeling chip. Low-pressure by design — the tap is a
      full turn. The therapist paces it and presses Next activity when done.

  - id: act_thermometer
    title: Feelings thermometer
    menu_only: true
    mode: rating
    rating_scale: 5
    opening_prompt:
      text: >
        Quick check — tap the face that shows how you're feeling right now.
    transition_prompt:
      text: Thanks for checking in.
    turn_policy:
      order: open
    participation:
      require_all_speak: false
      quiet_participant_strategy: skip
    pacing:
      min_phase_seconds: 0
      max_phase_seconds: 60
      advance_when: timer
    facilitator_notes: >
      A standalone feelings-thermometer reading (SUDS-style scaling). Launch it anytime to
      take the group's temperature mid-session.

  - id: act_roleplay
    title: Role-play corner
    menu_only: true
    opening_prompt:
      text: >
        Let's practice together. I'll set up a situation — like saying hi to a new friend —
        and we'll take turns trying it out. It's okay to be silly!
    transition_prompt:
      text: Great practicing, everyone.
    acknowledge_speakers: true
    turn_policy:
      order: open
      allow_pass: true
      one_turn_per_participant: false
    participation:
      require_all_speak: false
      quiet_participant_strategy: skip
    pacing:
      min_phase_seconds: 0
      advance_when: manual
    facilitator_notes: >
      Therapist-led role-play of a social situation (greetings, joining a game, asking for
      help) — the core of Social Effectiveness Therapy (SET-C). The therapist drives;
      children practise and improvise with support.
