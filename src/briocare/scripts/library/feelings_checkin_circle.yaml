schema_version: 1
id: feelings_checkin_circle
title: Feelings Check-in Circle
description: >
  A short opening ritual: the facilitator names a feeling, kids popcorn-share
  examples, then everyone goes around the circle naming how they feel today,
  and finally there is a brief open reflection.
age_range: [7, 11]
recommended_group_size: [3, 6]

intro_prompt:
  text: >
    Hi everyone, welcome back to our circle. We're going to start the way we
    always do, by checking in with how we're feeling today. There are no wrong
    answers here.
  variants:
    - Welcome back, friends. Let's begin with our feelings check-in.

closing_prompt:
  text: >
    Thanks for sharing, everyone. That's our check-in for today. Take a breath
    with me, and let's get ready for what's next.

phases:
  - id: model_and_warmup
    title: Warm-up — naming feelings
    opening_prompt:
      text: >
        Let's warm up. I'll say a feeling word, and if anyone wants to, you can
        call out a time you felt that way. "Excited" — when have you felt
        excited?
      addressed_to: group
    acknowledge_speakers: false
    turn_policy:
      order: popcorn
      allow_pass: true
      one_turn_per_participant: false
    participation:
      require_all_speak: false
      quiet_participant_strategy: skip
    pacing:
      min_phase_seconds: 20
      max_phase_seconds: 90
      wrapup_warning_seconds: 20
      advance_when: timer

  - id: go_around
    title: Go around the circle
    opening_prompt:
      text: >
        Now let's go all the way around the circle. When it's your turn, tell us
        one word or a short sentence about how you're feeling right now. You can
        always say "pass."
      addressed_to: group
    transition_prompt:
      text: Great job, everyone. Let's keep going.
    acknowledge_speakers: true
    turn_policy:
      order: round_robin
      per_turn_seconds: 25
      per_turn_hard_seconds: 60
      allow_pass: true
      one_turn_per_participant: true
    participation:
      require_all_speak: true
      invite_quiet_after_seconds: 20
      max_invites_per_participant: 2
      quiet_participant_strategy: direct_invite
      honor_pass: true
    pacing:
      min_phase_seconds: 30
      max_phase_seconds: 240
      wrapup_warning_seconds: 30
      advance_when: all_spoke_or_timer

  - id: reflect
    title: Open reflection
    opening_prompt:
      text: >
        Before we move on — does anyone want to add anything, or say something
        about what someone else shared? It's okay if not.
      addressed_to: group
    transition_prompt:
      text: Okay, let's wrap up our circle.
    acknowledge_speakers: false
    turn_policy:
      order: open
      allow_pass: true
      one_turn_per_participant: false
    participation:
      require_all_speak: false
      quiet_participant_strategy: skip
    pacing:
      min_phase_seconds: 0
      max_phase_seconds: 60
      wrapup_warning_seconds: 15
      advance_when: timer
