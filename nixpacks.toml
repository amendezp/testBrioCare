# Railway / Nixpacks build for the live telehealth co-pilot server.
# The engine is imported from src/ at runtime (server/app.py adds it to sys.path),
# so we only need the server requirements here — not an editable install.

[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r server/requirements.txt",
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn server.app:app --host 0.0.0.0 --port $PORT"
